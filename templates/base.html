{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}PayDay - Célébrez et soutenez vos proches. Plateforme de collecte de fonds pour anniversaires et événements.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}collecte de fonds, anniversaire, cagnotte, cadeaux, PayDay, Afrique, Congo{% endblock %}">
    
    <!-- PWA -->
    <meta name="theme-color" content="#0f0f0f">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="57x57" href="{% static 'icons/apple-icon-57x57.png' %}">
    <link rel="apple-touch-icon" sizes="60x60" href="{% static 'icons/apple-icon-60x60.png' %}">
    <link rel="apple-touch-icon" sizes="72x72" href="{% static 'icons/apple-icon-72x72.png' %}">
    <link rel="apple-touch-icon" sizes="76x76" href="{% static 'icons/apple-icon-76x76.png' %}">
    <link rel="apple-touch-icon" sizes="114x114" href="{% static 'icons/apple-icon-114x114.png' %}">
    <link rel="apple-touch-icon" sizes="120x120" href="{% static 'icons/apple-icon-120x120.png' %}">
    <link rel="apple-touch-icon" sizes="144x144" href="{% static 'icons/apple-icon-144x144.png' %}">
    <link rel="apple-touch-icon" sizes="152x152" href="{% static 'icons/apple-icon-152x152.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'icons/apple-icon-180x180.png' %}">
    <link rel="icon" type="image/png" sizes="192x192"  href="{% static 'icons/android-icon-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'icons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="96x96" href="{% static 'icons/favicon-96x96.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'icons/favicon-16x16.png' %}">
    <link rel="shortcut icon" href="{% static 'icons/favicon.ico' %}">
    <meta name="msapplication-TileColor" content="#0f0f0f">
    <meta name="msapplication-TileImage" content="{% static 'icons/ms-icon-144x144.png' %}">

    <!-- SEO / Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:title" content="{% block og_title %}PayDay | Collecte de fonds{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Célébrez et soutenez vos proches avec PayDay.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{% static 'icons/apple-icon-180x180.png' %}{% endblock %}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ request.build_absolute_uri }}">
    <meta property="twitter:title" content="{% block twitter_title %}PayDay | Collecte de fonds{% endblock %}">
    <meta property="twitter:description" content="{% block twitter_description %}Célébrez et soutenez vos proches avec PayDay.{% endblock %}">
    <meta property="twitter:image" content="{% block twitter_image %}{% static 'icons/apple-icon-180x180.png' %}{% endblock %}">

    <title>{% block title %}PayDay{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #fff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .video-container:hover video {
            opacity: 1;
        }
        .video-container video {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="min-h-screen custom-scrollbar {% block body_class %}{% endblock %}">

    <header class="fixed top-0 left-0 right-0 z-50 px-6 py-4 glass">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <a href="{% url 'fundraiser_list' %}" class="text-2xl font-bold tracking-tight text-white uppercase">PayDay</a>
            
            {% block header_content %}{% endblock %}
        </div>
    </header>

    <main class="pt-32 pb-12 px-6 max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
